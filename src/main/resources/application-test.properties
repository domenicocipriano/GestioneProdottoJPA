spring.application.name=GestioneProdottoJPA
server.port=8081
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.path=/h2-console
spring.h2.console.enabled=true
logging.level.org.springframework=DEBUG
#spring.security.user.name=admin			// Uncomment these lines to enable default security user
#spring.security.user.password=admin1234	// Uncomment these lines to enable default security user
